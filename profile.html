<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advocate Profile — Juris Global Legal Solutions</title>
<meta name="description" content="Detailed advocate profile — Juris Global Legal Solutions">
<meta name="keywords" content="best advocate in Delhi, top lawyer in India, best law firm for property disputes, top NRI lawyers, best criminal defense lawyer, Juris Global Legal Solutions, Supreme Court advocate, Delhi High Court lawyer, civil litigation expert, corporate lawyer India, best divorce lawyer Delhi, international legal consultants, top legal advisors, trusted law firm India, legal services for NRIs, property matters, white collar crime lawyer, NRI lawyer India, matrimonial lawyer India">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  /* ─── Hero Banner ─── */
  .prof-hero {
    position: relative;
    height: 420px;
    padding-top: calc(76px + 2rem); /* Account for navbar */
    background: linear-gradient(135deg, #0a1628 0%, #0d2240 40%, #112d52 70%, #0a1e38 100%);
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    padding-bottom: 0;
  }
  .prof-hero-bg {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9983a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .prof-hero-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--acc), transparent);
  }
  .prof-hero-inner {
    position: relative;
    z-index: 2;
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 2rem 0;
    width: 100%;
    display: flex;
    align-items: flex-end;
    gap: 3rem;
    padding-bottom: 3.5rem;
  }

  /* ─── Photo in hero ─── */
  .prof-photo-frame {
    width: 200px;
    height: 240px;
    flex-shrink: 0;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--acc);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 6px rgba(201,152,58,0.12);
    position: relative;
    bottom: -40px;
    background: var(--card-bg);
  }
  .prof-photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
  }
  .prof-photo-initials {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--acc);
    background: linear-gradient(135deg, #0d2240, #1a3a60);
  }

  /* ─── Hero Text ─── */
  .prof-hero-text {
    padding-bottom: 1.5rem;
  }
  .prof-breadcrumb {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 0.75rem;
  }
  .prof-breadcrumb a { color: var(--acc); text-decoration: none; }
  .prof-breadcrumb a:hover { color: #fff; }
  .prof-hero-name {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .prof-hero-role {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-style: italic;
    color: var(--acc);
    margin-bottom: 0.75rem;
  }
  .prof-hero-tagline {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
  }
  .prof-founding-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(201,152,58,0.15);
    border: 1px solid rgba(201,152,58,0.4);
    color: var(--acc);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
    margin-bottom: 0.75rem;
  }

  /* ─── Body Layout ─── */
  .prof-body {
    max-width: 1300px;
    margin: 0 auto;
    padding: 5rem 2rem 4rem;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 4rem;
    align-items: start;
  }

  /* ─── Sidebar ─── */
  .prof-sidebar { position: sticky; top: 5rem; }
  .prof-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .prof-card-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--acc);
    font-weight: 700;
    margin-bottom: 1rem;
    font-family: 'Inter', sans-serif;
  }
  .prof-list {
    list-style: none; padding: 0; margin: 0;
  }
  .prof-list li {
    font-size: 0.88rem;
    color: var(--txt-s);
    line-height: 1.5;
    margin-bottom: 0.65rem;
    padding-left: 1.1rem;
    position: relative;
  }
  .prof-list li::before {
    content: "⚖";
    color: var(--acc);
    position: absolute; left: 0; top: 0;
    font-size: 0.7rem;
    line-height: 1.6;
  }
  .prof-enrollment {
    font-size: 0.82rem;
    color: var(--txt-s);
    line-height: 1.6;
    background: rgba(201,152,58,0.06);
    border: 1px solid rgba(201,152,58,0.2);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    margin-top: 0.25rem;
    font-style: italic;
  }
  .prof-cta {
    display: block;
    text-align: center;
    background: var(--acc);
    color: #fff;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 1rem 1.5rem;
    border-radius: 100px;
    text-decoration: none;
    transition: 0.3s ease;
    margin-top: 0.25rem;
  }
  .prof-cta:hover {
    background: var(--accent-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,152,58,0.4);
  }
  .prof-back-link {
    display: block;
    text-align: center;
    color: var(--txt-s);
    font-size: 0.82rem;
    text-decoration: none;
    margin-top: 0.75rem;
    transition: 0.2s;
  }
  .prof-back-link:hover { color: var(--acc); }

  /* ─── Main Content ─── */
  .prof-main {}
  .prof-section { margin-bottom: 3.5rem; }
  .prof-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    color: var(--txt-h);
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .prof-section-title .pst-icon {
    width: 32px; height: 32px;
    background: rgba(201,152,58,0.1);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .prof-bio {
    font-size: 1.05rem;
    color: var(--txt-m);
    line-height: 1.9;
    text-align: justify;
    white-space: pre-wrap;
  }

  /* Expertise grid */
  .prof-expertise-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr));
    gap: 1rem;
  }
  .prof-expertise-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: 0.3s;
  }
  .prof-expertise-card:hover {
    border-color: var(--acc);
    background: rgba(201,152,58,0.05);
    transform: translateY(-2px);
  }
  .pec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--acc);
    flex-shrink: 0;
  }
  .pec-text {
    font-size: 0.88rem;
    color: var(--txt-m);
    font-weight: 500;
    line-height: 1.4;
  }

  /* Case history */
  .prof-case-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--acc);
    border-radius: 0 12px 12px 0;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    transition: 0.3s;
    position: relative;
  }
  .prof-case-item:hover {
    border-color: var(--acc);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    transform: translateX(4px);
  }
  .prof-case-item p {
    margin: 0;
    font-size: 0.95rem;
    color: var(--txt-s);
    line-height: 1.7;
    text-align: justify;
  }
  .prof-case-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 800;
    color: rgba(201,152,58,0.12);
    position: absolute;
    right: 1rem;
    top: 0.5rem;
    line-height: 1;
  }

  /* Notable clients */
  .prof-clients-box {
    background: linear-gradient(135deg, rgba(201,152,58,0.06), rgba(201,152,58,0.02));
    border: 1px solid rgba(201,152,58,0.2);
    border-radius: 14px;
    padding: 1.5rem 2rem;
  }
  .prof-clients-box p {
    margin: 0;
    font-size: 0.95rem;
    color: var(--txt-s);
    line-height: 1.8;
  }

  /* Tags strip */
  .prof-tags-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1rem;
  }
  .prof-tag {
    background: rgba(201,152,58,0.1);
    color: var(--acc);
    border: 1px solid rgba(201,152,58,0.3);
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.3rem 0.9rem;
    letter-spacing: 0.3px;
  }

  /* ─── Responsive ─── */
  @media(max-width: 900px) {
    .prof-hero { height: auto; padding-top: 5rem; }
    .prof-hero-inner { flex-direction: column; gap: 1.5rem; align-items: flex-start; padding-bottom: 2rem; }
    .prof-photo-frame { bottom: 0; width: 140px; height: 170px; }
    .prof-hero-name { font-size: 2.2rem; }
    .prof-body { grid-template-columns: 1fr; gap: 2.5rem; padding: 3rem 1.25rem 3rem; }
    .prof-sidebar { position: static; }
    .prof-expertise-grid { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width: 480px) {
    .prof-expertise-grid { grid-template-columns: 1fr; }
    .prof-hero-name { font-size: 1.8rem; }
  }
</style>
</head>
<body class="theme-slate">

<!-- ── NAVBAR ── -->
<div id="header-placeholder"></div>

<!-- ── PROFILE HERO ── -->
<div id="prof-hero-section">
  <div class="prof-hero">
    <div class="prof-hero-bg"></div>
    <div class="prof-hero-line"></div>
    <div class="prof-hero-inner">
      <div class="prof-photo-frame" id="prof-photo-slot">
        <div class="prof-photo-initials" id="prof-initials">…</div>
      </div>
      <div class="prof-hero-text">
        <div class="prof-breadcrumb">
          <a href="index.html">Home</a> &nbsp;›&nbsp; <a href="team.html">Our Team</a> &nbsp;›&nbsp; <span id="bc-name">…</span>
        </div>
        <div id="founding-badge" style="display:none;" class="prof-founding-badge">★ Founding Member</div>
        <h1 class="prof-hero-name" id="prof-name">…</h1>
        <div class="prof-hero-role" id="prof-role">…</div>
        <div class="prof-hero-tagline" id="prof-tagline">…</div>
      </div>
    </div>
  </div>
</div>

<!-- ── BODY ── -->
<div class="prof-body" id="prof-body">

  <!-- SIDEBAR -->
  <aside class="prof-sidebar" id="prof-sidebar">
    <!-- dynamically filled -->
  </aside>

  <!-- MAIN -->
  <main class="prof-main" id="prof-main">
    <!-- dynamically filled -->
  </main>

</div>

<!-- ── FOOTER ── -->
<div id="footer-placeholder"></div>

<!-- Back to Top -->
<button class="back-to-top" id="back-to-top" onclick="scrollToTop()" title="Scroll to top">↑</button>

<script src="assets/js/components.js"></script>
<script src="assets/js/content.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/chatbot.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const members = (typeof getTeamMembers === 'function') ? getTeamMembers() : [];
  const m = members.find(x => x.id === id);

  if (!m) {
    document.getElementById('prof-body').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:6rem 2rem;">
        <h2 style="font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--txt-h);margin-bottom:1rem;">Profile Not Found</h2>
        <p style="color:var(--txt-s);margin-bottom:2rem;">The advocate profile you are looking for could not be located.</p>
        <a href="team.html" class="btn-primary" style="display:inline-flex;">← Return to Team</a>
      </div>`;
    return;
  }

  // Update page title & meta
  document.title = m.name + ' — Juris Global Legal Solutions';

  // Populate hero
  document.getElementById('bc-name').textContent = m.name;
  document.getElementById('prof-name').textContent = m.name;
  document.getElementById('prof-role').textContent = m.role || '';
  document.getElementById('prof-tagline').textContent = m.tagline || '';

  // Founding badge
  const isFounder = (m.role || '').toLowerCase().includes('founding') || (m.role || '').toLowerCase().includes('founder');
  if (isFounder) document.getElementById('founding-badge').style.display = 'inline-flex';

  // Photo
  const photoSlot = document.getElementById('prof-photo-slot');
  const initials = m.name.split(' ').filter(w => /[A-Z]/i.test(w[0])).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  if (m.photo) {
    photoSlot.innerHTML = `<img src="${m.photo}" alt="${m.name}" onerror="this.parentElement.innerHTML='<div class=\\'prof-photo-initials\\'>${initials}</div>'">`;
  } else {
    photoSlot.innerHTML = `<div class="prof-photo-initials">${initials}</div>`;
  }

  // ── Data prep ──
  const bio = m.fullBio || m.desc || 'Profile details are being updated.';
  const eduList = (m.educationList && m.educationList.length) ? m.educationList : (m.education ? [m.education] : []);
  const expertiseList = (m.expertiseList && m.expertiseList.length) ? m.expertiseList : (m.tags ? m.tags.split(',') : []);
  const caseHistory = (m.caseHistory && m.caseHistory.length) ? m.caseHistory : [];
  const courts = (m.benches || '').split('·').map(c => c.trim()).filter(Boolean);
  const allTags = (m.tags || '').split(',').map(t => t.trim()).filter(Boolean);

  // ── SIDEBAR ──
  document.getElementById('prof-sidebar').innerHTML = `
    ${courts.length ? `
    <div class="prof-card">
      <div class="prof-card-label">Courts & Tribunals</div>
      <ul class="prof-list">
        ${courts.map(c => `<li>${c}</li>`).join('')}
      </ul>
    </div>` : ''}

    <div class="prof-card">
      <div class="prof-card-label">Education & Enrolment</div>
      <ul class="prof-list">
        ${eduList.map(e => `<li>${e}</li>`).join('')}
      </ul>
      ${m.enrollment ? `<div class="prof-enrollment">${m.enrollment}</div>` : ''}
    </div>

    <a href="index.html#contact" class="prof-cta">✉ Request a Consultation</a>
    <a href="team.html" class="prof-back-link">← Back to Our Team</a>
  `;

  // ── MAIN ──
  document.getElementById('prof-main').innerHTML = `

    <!-- About -->
    <div class="prof-section">
      <h2 class="prof-section-title">
        <span class="pst-icon">👤</span> About ${m.name}
      </h2>
      <p class="prof-bio">${bio}</p>
      ${allTags.length ? `<div class="prof-tags-strip">${allTags.map(t => `<span class="prof-tag">${t}</span>`).join('')}</div>` : ''}
    </div>

    <!-- Core Expertise -->
    ${expertiseList.length ? `
    <div class="prof-section">
      <h2 class="prof-section-title">
        <span class="pst-icon">⚖</span> Core Expertise
      </h2>
      <div class="prof-expertise-grid">
        ${expertiseList.map(e => `
          <div class="prof-expertise-card">
            <div class="pec-dot"></div>
            <div class="pec-text">${e.trim()}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Notable Clients -->
    ${m.notableclients ? `
    <div class="prof-section">
      <h2 class="prof-section-title">
        <span class="pst-icon">🏛</span> Notable Clients
      </h2>
      <div class="prof-clients-box">
        <p>${m.notableclients}</p>
      </div>
    </div>` : ''}

    <!-- Case History -->
    ${caseHistory.length ? `
    <div class="prof-section">
      <h2 class="prof-section-title">
        <span class="pst-icon">📋</span> Representative Case History
      </h2>
      ${caseHistory.map((h, i) => `
        <div class="prof-case-item">
          <span class="prof-case-num">${String(i+1).padStart(2,'0')}</span>
          <p>${h.trim()}</p>
        </div>`).join('')}
    </div>` : ''}

    <!-- CTA footer -->
    <div style="margin-top:3rem; padding:2rem; background:linear-gradient(135deg, rgba(201,152,58,0.07), rgba(201,152,58,0.02)); border:1px solid rgba(201,152,58,0.2); border-radius:16px; text-align:center;">
      <p style="font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--txt-h); margin-bottom:0.5rem;">Need Legal Assistance?</p>
      <p style="color:var(--txt-s); font-size:0.9rem; margin-bottom:1.5rem; max-width:500px; margin-left:auto; margin-right:auto;">Get in touch with our team for a confidential consultation. We respond within 24 hours on business days.</p>
      <a href="index.html#contact" class="btn-primary" style="display:inline-flex;">Schedule a Consultation →</a>
    </div>
  `;
  // ── Animate sections on scroll ──
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.opacity = '1';
        e.target.style.transform = 'translateY(0)';
      }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.prof-section, .prof-sidebar .prof-card').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(28px)';
    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
    observer.observe(el);
  });
})();
</script>
<script>
  // Scroll progress bar
  window.addEventListener('scroll', () => {
    const doc = document.documentElement;
    const scrollTop = doc.scrollTop || document.body.scrollTop;
    const scrollHeight = doc.scrollHeight - doc.clientHeight;
    const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
    const bar = document.getElementById('scroll-progress');
    if (bar) bar.style.width = pct + '%';
  });
</script>

<div id="footer-placeholder"></div>
<script src="assets/js/components.js"></script>
<script src="assets/js/content.js"></script>
<script type="module" src="assets/js/firebase-db.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/chatbot.js"></script>

</body>
</html>
