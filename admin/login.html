
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juris Global - Admin Login</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; }
  .login-box { background: var(--surface); padding: 3rem; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 2rem; text-align: center; color: var(--txt); }
  .login-logo span { color: var(--accent); }
  .input-group { margin-bottom: 1.5rem; }
  .input-group label { display: block; margin-bottom: 0.5rem; color: var(--txt-s); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
  .input-group input { width: 100%; padding: 0.8rem; background: var(--bg2); border: 1px solid var(--border); color: var(--txt); border-radius: 6px; }
  .btn-login { width: 100%; padding: 1rem; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .btn-login:hover { opacity: 0.9; }
  .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; display: none; }
</style>
  <link rel="stylesheet" href="../assets/css/loader.css">
</head>
<body class="theme-slate">
  <!-- ── JURIS GLOBAL PAGE LOADER ── -->
  <div id="jg-loader" role="status" aria-label="Loading Juris Global Legal Solutions">
    <div class="loader-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Scales of Justice icon drawn in SVG -->
        <!-- Beam / top bar -->
        <rect x="31" y="8" width="2" height="40" rx="1" fill="currentColor"/>
        <!-- Horizontal bar -->
        <rect x="10" y="14" width="44" height="2.5" rx="1.25" fill="currentColor"/>
        <!-- Left pan chain -->
        <line x1="14" y1="16.5" x2="14" y2="30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="16.5" x2="20" y2="30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Right pan chain -->
        <line x1="44" y1="16.5" x2="44" y2="30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="50" y1="16.5" x2="50" y2="30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Left pan -->
        <path d="M11 30 Q17 36 23 30" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Right pan -->
        <path d="M41 30 Q47 36 53 30" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Base pillar -->
        <rect x="25" y="48" width="14" height="3" rx="1.5" fill="currentColor"/>
        <!-- Top ornament -->
        <circle cx="32" cy="9" r="3" fill="currentColor"/>
      </svg>
    </div>
    <div class="loader-firm-name">Juris Global<br><span>Legal Solutions</span></div>
    <div class="loader-tagline">Advocates &amp; Legal Consultants</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar"></div>
    </div>
  </div>

  <div class="login-box">
    <div class="login-logo">Juris Global <br><span>Legal Solutions</span></div>
    <div class="error-msg" id="error-msg"></div>
    <form id="login-form">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn-login">Secure Login</button>
    </form>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.getCurrentUser()) { window.location.href = 'cms.html'; }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const res = Auth.login(user, pass);
      if (res.success) {
        window.location.href = 'cms.html';
      } else {
        const err = document.getElementById('error-msg');
        err.textContent = res.msg;
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
